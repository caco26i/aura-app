# Same as nginx-docker.conf plus /aura-bff → aura-bff (strip prefix, matches Vite dev proxy).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /v1/ {
        proxy_pass http://aura-api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://aura-api:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://aura-api:8787/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /aura-bff/ {
        proxy_pass http://aura-bff:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional /ingest/aura → collector (runtime: AURA_TELEMETRY_PROXY_TARGET); see web/docker-entrypoint.d/
    include /etc/nginx/snippets/aura-fragment-telemetry.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
