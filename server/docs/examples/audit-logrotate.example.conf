# Example logrotate stanza for the Aura API audit file (NDJSON).
#
# 1. Set the path below to match AUDIT_LOG_PATH on the host (Compose defaults
#    often map a volume so the file lives under something like /var/lib/aura/audit.log).
# 2. After logrotate moves aside the old file and creates a new inode at the same path,
#    the Node process must reopen the descriptor — the server listens for SIGUSR2 on Unix
#    for that purpose (see docs/RUNBOOK_AUDIT.md).
# 3. PID 1 caveat (containers): in minimal images the API may run as PID 1. PID 1 ignores
#    unhandled signals on Linux unless the process installed a handler — Aura installs
#    SIGUSR2, so `kill -USR2 1` from inside the container works. From the host, prefer
#    `docker kill -s USR2 <container>` or your orchestrator’s equivalent so the signal
#    reaches the Node process, not a wrapper.
#
# Install: copy to /etc/logrotate.d/aura-audit (or include this file from logrotate.conf)
# and adjust paths / postrotate to your init system.

/var/lib/aura/audit.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        # Bare metal / VM: example — replace with your PID file or service reload.
        # kill -USR2 "$(cat /run/aura-api.pid)" 2>/dev/null || true
        #
        # Docker (API container name from compose):
        # docker kill -s USR2 aura-app-aura-api-1
        true
    endscript
}
