# Example stack for beta operators: bind-mount or named volume for durable SQLite + audit.
# Copy `.env` or export `AURA_API_BEARER_TOKEN` before `docker compose up`.
services:
  aura-api:
    build: .
    ports:
      - "${PORT:-8787}:8787"
    environment:
      PORT: "8787"
      AURA_API_BEARER_TOKEN: ${AURA_API_BEARER_TOKEN:?Set AURA_API_BEARER_TOKEN in the environment or a .env file}
      # Optional: AURA_API_BFF_JWT_SECRET, CORS_ORIGIN, etc. — see server/README.md
      AUDIT_LOG_PATH: /app/data/audit.log
      AURA_API_JOURNEY_STORE_SQLITE_PATH: /app/data/journeys.sqlite
      AURA_API_JOURNEY_STORE_JSONL_PATH: /app/data/journeys.jsonl
    volumes:
      - aura-api-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  aura-api-data:
