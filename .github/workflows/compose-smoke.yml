# Full-stack wiring check: nginx (aura-web) → aura-api. Does not run on push/PR
# (keeps PR CI fast). Trigger manually; add `schedule:` here if you want nightly/weekly.
name: Compose stack smoke

on:
  workflow_dispatch:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Ephemeral API token for compose (.env)
        run: |
          echo "AURA_API_BEARER_TOKEN=$(openssl rand -hex 24)" > .env
          short_sha="${GITHUB_SHA:0:7}"
          echo "AURA_API_GIT_SHA=${short_sha}" >> .env
          echo "AURA_API_DEPLOY_VERSION=compose-smoke" >> .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for /health and /ready via aura-web (proxied)
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
              echo "health ok (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::group::compose ps + logs"
              docker compose ps
              docker compose logs --tail=120
              echo "::endgroup::"
              exit 1
            fi
            sleep 2
          done
          health_json="$(curl -fsS "http://127.0.0.1:8080/health")"
          echo "${health_json}"
          echo "${health_json}" | jq -e --arg sha "${GITHUB_SHA:0:7}" '.gitSha == $sha' >/dev/null
          echo "${health_json}" | jq -e '.deployVersion == "compose-smoke"' >/dev/null
          curl -fsS "http://127.0.0.1:8080/ready"
          echo

      - name: Assert nginx serves SPA index shell at /
        run: |
          set -euo pipefail
          code="$(curl -sS -o /tmp/aura_compose_spa_index.html -w "%{http_code}" "http://127.0.0.1:8080/")"
          if [ "${code}" != "200" ]; then
            echo "::error::compose-smoke SPA check: GET / returned HTTP ${code}, expected 200 (nginx static root / aura-web asset wiring)"
            exit 1
          fi
          if ! grep -qF '<div id="root"' /tmp/aura_compose_spa_index.html; then
            echo "::error::compose-smoke SPA check: HTML missing Vite mount <div id=\"root\" (expected shell from web/index.html)"
            head -c 800 /tmp/aura_compose_spa_index.html || true
            exit 1
          fi
          echo "compose-smoke SPA check ok: GET / is 200 and contains <div id=\"root\""

      - name: Assert POST /v1/journeys via nginx (static bearer)
        run: |
          set -euo pipefail
          if [ ! -f .env ]; then
            echo "::error::compose-smoke: .env missing (expected AURA_API_BEARER_TOKEN from prior step)"
            exit 1
          fi
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          if [ -z "${AURA_API_BEARER_TOKEN:-}" ]; then
            echo "::error::compose-smoke: AURA_API_BEARER_TOKEN is empty"
            exit 1
          fi
          code="$(curl -sS -o /tmp/aura_compose_journey.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys" \
            -H "Authorization: Bearer ${AURA_API_BEARER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-smoke POST /v1/journeys: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_compose_journey.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.journeyId | type == "string") and (.data.journeyId | test("^[0-9a-fA-F-]{36}$"))' /tmp/aura_compose_journey.json >/dev/null; then
            echo "::error::compose-smoke: POST /v1/journeys JSON missing ok=true and data.journeyId (UUID)"
            echo "::group::response body"
            cat /tmp/aura_compose_journey.json || true
            echo "::endgroup::"
            docker compose logs --tail=120
            exit 1
          fi
          journey_id="$(jq -r '.data.journeyId' /tmp/aura_compose_journey.json)"
          echo "compose-smoke POST /v1/journeys ok: HTTP ${code}, journeyId=${journey_id}"

          code="$(curl -sS -o /tmp/aura_compose_location_share.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys/${journey_id}/location-shares" \
            -H "Authorization: Bearer ${AURA_API_BEARER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-smoke POST .../location-shares: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_compose_location_share.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.shareId | type == "string") and (.data.shareId | test("^[0-9a-fA-F-]{36}$"))' /tmp/aura_compose_location_share.json >/dev/null; then
            echo "::error::compose-smoke: POST .../location-shares JSON missing ok=true and data.shareId (UUID)"
            echo "::group::response body"
            cat /tmp/aura_compose_location_share.json || true
            echo "::endgroup::"
            docker compose logs --tail=120
            exit 1
          fi
          echo "compose-smoke POST .../location-shares ok: HTTP ${code}, shareId=$(jq -r '.data.shareId' /tmp/aura_compose_location_share.json)"

          code="$(curl -sS -o /tmp/aura_compose_im_safe.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys/${journey_id}/im-safe" \
            -H "Authorization: Bearer ${AURA_API_BEARER_TOKEN}")"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-smoke POST .../im-safe: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_compose_im_safe.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.receivedAt | type == "string") and (.data.receivedAt | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"))' /tmp/aura_compose_im_safe.json >/dev/null; then
            echo "::error::compose-smoke: POST .../im-safe JSON missing ok=true and data.receivedAt (ISO-8601)"
            echo "::group::response body"
            cat /tmp/aura_compose_im_safe.json || true
            echo "::endgroup::"
            docker compose logs --tail=120
            exit 1
          fi
          echo "compose-smoke POST .../im-safe ok: HTTP ${code}, receivedAt=$(jq -r '.data.receivedAt' /tmp/aura_compose_im_safe.json)"

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  compose-bff-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: JWT + BFF .env (no static bearer / no VITE token)
        run: |
          cat > .env <<EOF
          AURA_API_BFF_JWT_SECRET=$(openssl rand -hex 32)
          AURA_BFF_SESSION_SECRET=$(openssl rand -hex 32)
          VITE_GOOGLE_CLIENT_ID=ci-smoke-placeholder.apps.googleusercontent.com
          AURA_BFF_CORS_ORIGIN=http://127.0.0.1:8080
          EOF
          short_sha="${GITHUB_SHA:0:7}"
          echo "AURA_API_GIT_SHA=${short_sha}" >> .env
          echo "AURA_API_DEPLOY_VERSION=compose-smoke" >> .env

      - name: Build and start stack (merged compose)
        run: docker compose -f docker-compose.yml -f docker-compose.bff.yml up -d --build

      - name: Wait for /health, /ready, and BFF via nginx
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
              echo "health ok (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::group::compose ps + logs"
              docker compose -f docker-compose.yml -f docker-compose.bff.yml ps
              docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=200
              echo "::endgroup::"
              exit 1
            fi
            sleep 2
          done
          health_json="$(curl -fsS "http://127.0.0.1:8080/health")"
          echo "${health_json}"
          echo "${health_json}" | jq -e --arg sha "${GITHUB_SHA:0:7}" '.gitSha == $sha' >/dev/null
          echo "${health_json}" | jq -e '.deployVersion == "compose-smoke"' >/dev/null
          curl -fsS "http://127.0.0.1:8080/ready"
          echo
          curl -fsS "http://127.0.0.1:8080/aura-bff/health"
          echo

      - name: Assert nginx serves SPA index shell at /
        run: |
          set -euo pipefail
          code="$(curl -sS -o /tmp/aura_compose_spa_index.html -w "%{http_code}" "http://127.0.0.1:8080/")"
          if [ "${code}" != "200" ]; then
            echo "::error::compose-bff-smoke SPA check: GET / returned HTTP ${code}, expected 200 (nginx static root / aura-web asset wiring)"
            exit 1
          fi
          if ! grep -qF '<div id="root"' /tmp/aura_compose_spa_index.html; then
            echo "::error::compose-bff-smoke SPA check: HTML missing Vite mount <div id=\"root\" (expected shell from web/index.html)"
            head -c 800 /tmp/aura_compose_spa_index.html || true
            exit 1
          fi
          echo "compose-bff-smoke SPA check ok: GET / is 200 and contains <div id=\"root\""

      - name: Assert POST journey + location-share + im-safe via nginx (BFF JWT)
        run: |
          set -euo pipefail
          if [ ! -f .env ]; then
            echo "::error::compose-bff-smoke: .env missing (expected AURA_API_BFF_JWT_SECRET from prior step)"
            exit 1
          fi
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          if [ -z "${AURA_API_BFF_JWT_SECRET:-}" ]; then
            echo "::error::compose-bff-smoke: AURA_API_BFF_JWT_SECRET is empty"
            exit 1
          fi
          api_jwt="$(node -e "
          const { createHmac } = require('node:crypto');
          const secret = process.env.AURA_API_BFF_JWT_SECRET;
          if (!secret) process.exit(1);
          const sub = 'compose-bff-smoke-ci';
          const now = Math.floor(Date.now() / 1000);
          const exp = now + 3600;
          const payload = { sub, exp, iat: now };
          const header = Buffer.from(JSON.stringify({ alg: 'HS256', typ: 'JWT' })).toString('base64url');
          const body = Buffer.from(JSON.stringify(payload)).toString('base64url');
          const signingInput = header + '.' + body;
          const sig = createHmac('sha256', secret).update(signingInput).digest('base64url');
          process.stdout.write(signingInput + '.' + sig);
          ")"
          code="$(curl -sS -o /tmp/aura_bff_compose_journey.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys" \
            -H "Authorization: Bearer ${api_jwt}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-bff-smoke POST /v1/journeys: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_journey.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.journeyId | type == "string") and (.data.journeyId | test("^[0-9a-fA-F-]{36}$"))' /tmp/aura_bff_compose_journey.json >/dev/null; then
            echo "::error::compose-bff-smoke: POST /v1/journeys JSON missing ok=true and data.journeyId (UUID)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_journey.json || true
            echo "::endgroup::"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            exit 1
          fi
          journey_id="$(jq -r '.data.journeyId' /tmp/aura_bff_compose_journey.json)"
          echo "compose-bff-smoke POST /v1/journeys ok: HTTP ${code}, journeyId=${journey_id}"

          code="$(curl -sS -o /tmp/aura_bff_compose_location_share.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys/${journey_id}/location-shares" \
            -H "Authorization: Bearer ${api_jwt}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-bff-smoke POST .../location-shares: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_location_share.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.shareId | type == "string") and (.data.shareId | test("^[0-9a-fA-F-]{36}$"))' /tmp/aura_bff_compose_location_share.json >/dev/null; then
            echo "::error::compose-bff-smoke: POST .../location-shares JSON missing ok=true and data.shareId (UUID)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_location_share.json || true
            echo "::endgroup::"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            exit 1
          fi
          echo "compose-bff-smoke POST .../location-shares ok: HTTP ${code}, shareId=$(jq -r '.data.shareId' /tmp/aura_bff_compose_location_share.json)"

          code="$(curl -sS -o /tmp/aura_bff_compose_im_safe.json -w "%{http_code}" -X POST "http://127.0.0.1:8080/v1/journeys/${journey_id}/im-safe" \
            -H "Authorization: Bearer ${api_jwt}")"
          if [ "${code}" != "201" ] && [ "${code}" != "200" ]; then
            echo "::error::compose-bff-smoke POST .../im-safe: HTTP ${code}, expected 200 or 201 (see web/docs/API_CONTRACT.md)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_im_safe.json || true
            echo "::endgroup::"
            echo "::group::docker compose logs (tail)"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            echo "::endgroup::"
            exit 1
          fi
          if ! jq -e '.ok == true and (.data.receivedAt | type == "string") and (.data.receivedAt | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"))' /tmp/aura_bff_compose_im_safe.json >/dev/null; then
            echo "::error::compose-bff-smoke: POST .../im-safe JSON missing ok=true and data.receivedAt (ISO-8601)"
            echo "::group::response body"
            cat /tmp/aura_bff_compose_im_safe.json || true
            echo "::endgroup::"
            docker compose -f docker-compose.yml -f docker-compose.bff.yml logs --tail=120
            exit 1
          fi
          echo "compose-bff-smoke POST .../im-safe ok: HTTP ${code}, receivedAt=$(jq -r '.data.receivedAt' /tmp/aura_bff_compose_im_safe.json)"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.bff.yml down -v --remove-orphans

  compose-telemetry-proxy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: .env with token + same-origin telemetry build arg
        run: |
          echo "AURA_API_BEARER_TOKEN=$(openssl rand -hex 24)" > .env
          short_sha="${GITHUB_SHA:0:7}"
          echo "AURA_API_GIT_SHA=${short_sha}" >> .env
          echo "AURA_API_DEPLOY_VERSION=compose-smoke" >> .env
          echo "VITE_AURA_TELEMETRY_ENDPOINT=/ingest/aura" >> .env

      - name: Build and start stack (telemetry stub override)
        run: docker compose -f docker-compose.yml -f docker-compose.telemetry-smoke.yml up -d --build

      - name: Wait for /health via aura-web (proxied)
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
              echo "health ok (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::group::compose ps + logs"
              docker compose -f docker-compose.yml -f docker-compose.telemetry-smoke.yml ps
              docker compose -f docker-compose.yml -f docker-compose.telemetry-smoke.yml logs --tail=200
              echo "::endgroup::"
              exit 1
            fi
            sleep 2
          done

      - name: Assert nginx serves SPA index shell at /
        run: |
          set -euo pipefail
          code="$(curl -sS -o /tmp/aura_compose_spa_index.html -w "%{http_code}" "http://127.0.0.1:8080/")"
          if [ "${code}" != "200" ]; then
            echo "::error::compose-telemetry-proxy-smoke SPA check: GET / returned HTTP ${code}, expected 200 (nginx static root / aura-web asset wiring)"
            exit 1
          fi
          if ! grep -qF '<div id="root"' /tmp/aura_compose_spa_index.html; then
            echo "::error::compose-telemetry-proxy-smoke SPA check: HTML missing Vite mount <div id=\"root\" (expected shell from web/index.html)"
            head -c 800 /tmp/aura_compose_spa_index.html || true
            exit 1
          fi
          echo "compose-telemetry-proxy-smoke SPA check ok: GET / is 200 and contains <div id=\"root\""

      - name: POST /ingest/aura via nginx proxy
        run: |
          set -euo pipefail
          code="$(curl -sS -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8080/ingest/aura" \
            -H "Content-Type: application/json" -d '{"smoke":true}')"
          echo "POST /ingest/aura HTTP ${code}"
          test "${code}" = "200"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.telemetry-smoke.yml down -v --remove-orphans

  compose-bff-telemetry-proxy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate merged compose (BFF + telemetry stub)
        run: |
          set -euo pipefail
          export VITE_GOOGLE_CLIENT_ID=ci-smoke-placeholder.apps.googleusercontent.com
          export AURA_API_BFF_JWT_SECRET="$(openssl rand -hex 32)"
          export AURA_BFF_SESSION_SECRET="$(openssl rand -hex 32)"
          python3 <<'PY'
          import json, os, subprocess

          r = subprocess.run(
              [
                  "docker",
                  "compose",
                  "-f",
                  "docker-compose.yml",
                  "-f",
                  "docker-compose.bff.yml",
                  "-f",
                  "docker-compose.telemetry-smoke.yml",
                  "config",
                  "--format",
                  "json",
              ],
              capture_output=True,
              text=True,
              env=os.environ,
          )
          if r.returncode != 0:
              print(r.stderr, file=__import__("sys").stderr)
              raise SystemExit(r.returncode)
          deps = json.loads(r.stdout)["services"]["aura-web"].get("depends_on") or {}
          need = {"aura-api", "aura-bff", "aura-telemetry-stub"}
          missing = need - set(deps)
          assert not missing, f"aura-web depends_on missing: {missing}"
          PY

      - name: JWT + BFF + same-origin telemetry .env
        run: |
          cat > .env <<EOF
          AURA_API_BFF_JWT_SECRET=$(openssl rand -hex 32)
          AURA_BFF_SESSION_SECRET=$(openssl rand -hex 32)
          VITE_GOOGLE_CLIENT_ID=ci-smoke-placeholder.apps.googleusercontent.com
          AURA_BFF_CORS_ORIGIN=http://127.0.0.1:8080
          VITE_AURA_TELEMETRY_ENDPOINT=/ingest/aura
          AURA_TELEMETRY_PROXY_TARGET=http://aura-telemetry-stub:8080/ingest/aura
          EOF
          short_sha="${GITHUB_SHA:0:7}"
          echo "AURA_API_GIT_SHA=${short_sha}" >> .env
          echo "AURA_API_DEPLOY_VERSION=compose-smoke" >> .env

      - name: Build and start stack (BFF + telemetry stub)
        run: docker compose -f docker-compose.yml -f docker-compose.bff.yml -f docker-compose.telemetry-smoke.yml up -d --build

      - name: Wait for /health, /ready, BFF, then POST /ingest/aura
        run: |
          set -euo pipefail
          COMPOSE_FILES=(-f docker-compose.yml -f docker-compose.bff.yml -f docker-compose.telemetry-smoke.yml)
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8080/health" >/dev/null 2>&1; then
              echo "health ok (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::group::compose ps + logs"
              docker compose "${COMPOSE_FILES[@]}" ps
              docker compose "${COMPOSE_FILES[@]}" logs --tail=200
              echo "::endgroup::"
              exit 1
            fi
            sleep 2
          done
          health_json="$(curl -fsS "http://127.0.0.1:8080/health")"
          echo "${health_json}"
          echo "${health_json}" | jq -e --arg sha "${GITHUB_SHA:0:7}" '.gitSha == $sha' >/dev/null
          echo "${health_json}" | jq -e '.deployVersion == "compose-smoke"' >/dev/null
          curl -fsS "http://127.0.0.1:8080/ready"
          echo
          curl -fsS "http://127.0.0.1:8080/aura-bff/health"
          echo
          code="$(curl -sS -o /tmp/aura_compose_spa_index.html -w "%{http_code}" "http://127.0.0.1:8080/")"
          if [ "${code}" != "200" ]; then
            echo "::error::compose-bff-telemetry-proxy-smoke SPA check: GET / returned HTTP ${code}, expected 200 (nginx static root / aura-web asset wiring)"
            exit 1
          fi
          if ! grep -qF '<div id="root"' /tmp/aura_compose_spa_index.html; then
            echo "::error::compose-bff-telemetry-proxy-smoke SPA check: HTML missing Vite mount <div id=\"root\" (expected shell from web/index.html)"
            head -c 800 /tmp/aura_compose_spa_index.html || true
            exit 1
          fi
          echo "compose-bff-telemetry-proxy-smoke SPA check ok: GET / is 200 and contains <div id=\"root\""
          code="$(curl -sS -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8080/ingest/aura" \
            -H "Content-Type: application/json" -d '{"smoke":true}')"
          echo "POST /ingest/aura HTTP ${code}"
          test "${code}" = "200"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.bff.yml -f docker-compose.telemetry-smoke.yml down -v --remove-orphans
