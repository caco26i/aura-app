name: Server API tests

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/docs/API_CONTRACT.md'
      - '.github/workflows/server-tests.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'web/docs/API_CONTRACT.md'
      - '.github/workflows/server-tests.yml'

jobs:
  bff-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/bff/package-lock.json
      - run: npm ci
      - run: npm test

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (better-sqlite3 native compile smoke)
        run: docker build -f server/Dockerfile server
