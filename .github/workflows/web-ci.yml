name: Web CI (lint, unit, e2e, build)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docker-compose.yml'
      - 'docker-compose.bff.yml'
      - '.env.example'
      - 'scripts/check-compose-env-example.mjs'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'docker-compose.yml'
      - 'docker-compose.bff.yml'
      - '.env.example'
      - 'scripts/check-compose-env-example.mjs'
      - '.github/workflows/web-ci.yml'

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Compose env vs .env.example (no drift)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-compose-env-example.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Production build must reject BFF URL + static token together
        run: |
          if VITE_AURA_BFF_URL=/aura-bff VITE_AURA_API_TOKEN=ci-forbidden-static-token npm run build; then
            echo "::error::BFF-first guardrail missing: build should fail when VITE_AURA_BFF_URL and VITE_AURA_API_TOKEN are both set (see web/vite.config.ts, web/docs/DEPLOY.md)."
            exit 1
          fi
      - run: npm run test:e2e
        env:
          CI: true
      - name: Docker build (web image smoke)
        working-directory: ${{ github.workspace }}
        run: docker build -f web/Dockerfile web
