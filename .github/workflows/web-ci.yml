# Toolchain: Node 20 + npm ci (package-lock.json). Matches web/package.json engines and
# docs/PUBLIC_BETA.md — this repo does not use pnpm at the package level.
#
# Path filters: web/** (all e2e under web/e2e/, including a11y-transport-checkin.spec.ts),
# root compose + .env.example drift check, and this workflow file.
# PR/push skips when only server/ or unrelated paths change.
#
# Playwright: `npm run test:e2e` runs the default suite (testIgnore: settings-beta-bff.spec.ts).
# Includes smoke, welcome, emergency, settings, map intel, /auth shell, and axe a11y on / + /transport + /checkin + /cita + /map + /trusted + /journey/new + /journey/active + /emergency + /settings.
# BFF-stub spec (`settings-beta-bff.spec.ts`: dead-proxy failure, mocked session success, POST /v1/journeys) runs next via
# `npm run test:e2e:bff-stub` (mocked BFF only — no real BFF process, OAuth, or secrets). New files under web/e2e/ still match web/**.
name: Web lint & build

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docker-compose.yml'
      - 'docker-compose.bff.yml'
      - 'docker-compose.telemetry-smoke.yml'
      - '.env.example'
      - 'scripts/check-compose-env-example.mjs'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'docker-compose.yml'
      - 'docker-compose.bff.yml'
      - 'docker-compose.telemetry-smoke.yml'
      - '.env.example'
      - 'scripts/check-compose-env-example.mjs'
      - '.github/workflows/web-ci.yml'

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Compose env vs .env.example (no drift)
        working-directory: ${{ github.workspace }}
        run: node scripts/check-compose-env-example.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Production build must reject BFF URL + static token together
        run: |
          if VITE_AURA_BFF_URL=/aura-bff VITE_AURA_API_TOKEN=ci-forbidden-static-token npm run build; then
            echo "::error::BFF-first guardrail missing: build should fail when VITE_AURA_BFF_URL and VITE_AURA_API_TOKEN are both set (see web/vite.config.ts, web/docs/DEPLOY.md)."
            exit 1
          fi
      # Full default Playwright suite (see playwright.config.ts testIgnore for BFF-stub-only spec).
      - run: npm run test:e2e
        env:
          CI: true
      # BFF-stub Playwright slice (settings-beta-bff.spec.ts only; mocked session + POST /v1/journeys).
      - run: npm run test:e2e:bff-stub
        env:
          CI: true
      - name: Docker build (web image smoke)
        working-directory: ${{ github.workspace }}
        run: docker build -f web/Dockerfile web
