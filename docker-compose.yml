# Full stack for operators: static web (nginx + Vite dist) + Aura API.
# Default: static bearer — `.env` needs `AURA_API_BEARER_TOKEN` (also passed into the web
# image as `VITE_AURA_API_TOKEN` at build time). For **JWT + BFF** without a static token in
# the web bundle, use `docker-compose.bff.yml` as a second compose file (see web/docs/DEPLOY.md).
#
# Audit + SQLite persistence: `aura-api` sets AUDIT_LOG_PATH=/app/data/audit.log and mounts
# the named volume `aura-api-data` at /app/data (journey SQLite/JSONL live there too). For
# log rotation on the host, run logrotate against the file inside the volume or bind-mount
# a host directory, then signal the API to reopen the log — e.g. `docker kill -s USR2 <container>`.
# Details: server/docs/RUNBOOK_AUDIT.md and server/docs/examples/audit-logrotate.example.conf
#
#   docker compose up --build
#
# Web UI: http://localhost:${WEB_PORT:-8080} — browser calls /v1 on the same origin; nginx
# proxies to `aura-api`. Optional same-origin telemetry: set `AURA_TELEMETRY_PROXY_TARGET` to the
# collector URL and build with `VITE_AURA_TELEMETRY_ENDPOINT=/ingest/aura` (see web/docs/DEPLOY.md).

services:
  aura-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      PORT: "8787"
      AURA_API_BEARER_TOKEN: ${AURA_API_BEARER_TOKEN:-}
      AURA_API_DEPLOY_VERSION: ${AURA_API_DEPLOY_VERSION:-}
      AURA_API_GIT_SHA: ${AURA_API_GIT_SHA:-}
      AUDIT_LOG_PATH: /app/data/audit.log
      AURA_API_JOURNEY_STORE_SQLITE_PATH: /app/data/journeys.sqlite
      AURA_API_JOURNEY_STORE_JSONL_PATH: /app/data/journeys.jsonl
    volumes:
      - aura-api-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  aura-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_AURA_API_TOKEN: ${VITE_AURA_API_TOKEN:-${AURA_API_BEARER_TOKEN:-}}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_AURA_API_URL: ${VITE_AURA_API_URL:-}
        VITE_AURA_TELEMETRY_ENDPOINT: ${VITE_AURA_TELEMETRY_ENDPOINT:-}
        VITE_AURA_TELEMETRY_DEBUG: ${VITE_AURA_TELEMETRY_DEBUG:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      AURA_TELEMETRY_PROXY_TARGET: ${AURA_TELEMETRY_PROXY_TARGET:-}
    depends_on:
      aura-api:
        condition: service_healthy

volumes:
  aura-api-data:
