# Full stack for operators: static web (nginx + Vite dist) + Aura API.
# From repo root: copy or create `.env` with at least `AURA_API_BEARER_TOKEN` (same value
# is passed into the web image as `VITE_AURA_API_TOKEN` at build time).
#
#   docker compose up --build
#
# Web UI: http://localhost:${WEB_PORT:-8080} — browser calls /v1 on the same origin; nginx
# proxies to `aura-api`. See web/docs/DEPLOY.md for VITE_* limitations and telemetry.

services:
  aura-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      PORT: "8787"
      AURA_API_BEARER_TOKEN: ${AURA_API_BEARER_TOKEN:?Set AURA_API_BEARER_TOKEN in .env or the environment}
      AUDIT_LOG_PATH: /app/data/audit.log
      AURA_API_JOURNEY_STORE_SQLITE_PATH: /app/data/journeys.sqlite
      AURA_API_JOURNEY_STORE_JSONL_PATH: /app/data/journeys.jsonl
    volumes:
      - aura-api-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  aura-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_AURA_API_TOKEN: ${AURA_API_BEARER_TOKEN}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_AURA_API_URL: ${VITE_AURA_API_URL:-}
        VITE_AURA_TELEMETRY_ENDPOINT: ${VITE_AURA_TELEMETRY_ENDPOINT:-}
        VITE_AURA_TELEMETRY_DEBUG: ${VITE_AURA_TELEMETRY_DEBUG:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      aura-api:
        condition: service_healthy

volumes:
  aura-api-data:
